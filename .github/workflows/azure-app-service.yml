name: Deploy Azure App Service

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: mosaic-audit-tracker-live
  NODE_VERSION: "22.x"

jobs:
  build-and-deploy:
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_AZURE_DEPLOY == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Write deployment metadata
        run: |
          cat > server/deploy-info.json <<EOF
          {
            "source": "github-actions",
            "commit": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "deployedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "workflowRun": "${GITHUB_RUN_ID}"
          }
          EOF

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
